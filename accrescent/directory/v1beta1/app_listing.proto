syntax = "proto3";

package accrescent.directory.v1beta1;

import "accrescent/directory/v1beta1/compatibility.proto";
import "accrescent/directory/v1beta1/download_size.proto";
import "accrescent/directory/v1beta1/image.proto";
import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.directory.v1beta1";

// A localized store listing for a given app.
message AppListing {
  // The application ID this listing is associated with
  optional string app_id = 1 [
    (buf.validate.field).required = true,
    // According to
    // https://developer.android.com/build/configure-app-module#set-application-id,
    // the app ID must conform to the following rules:
    //
    // 1. It must have at least two segments (one or more dots).
    // 2. Each segment must start with a letter.
    // 3. All characters must be alphanumeric or an underscore [a-zA-Z0-9_].
    //
    // The maximum length is imposed by us to set a reasonable limit.
    (buf.validate.field).string = {
      pattern: "^([a-zA-Z][a-zA-Z0-9_]*\\.)+[a-zA-Z][a-zA-Z0-9_]*$"
      max_bytes: 128
    }
  ];

  // The language of this listing's fields as a BCP-47 tag.
  optional string language = 2 [(buf.validate.field).required = true];

  // The proper name of the app, possibly including very short descriptive text
  // (e.g. "SecureChat - Secure Texting").
  optional string name = 3 [(buf.validate.field).required = true];

  // A short description of the app to be shown in headers and small screen
  // spaces.
  optional string short_description = 4 [(buf.validate.field).required = true];

  // The app's primary icon, usually the same as the launcher icon.
  Image icon = 5 [(buf.validate.field).required = true];

  // The display name of the app's latest version, e.g., "1.4.2".
  optional string version_name = 6 [(buf.validate.field).required = true];

  // Compatibility information between the app and the device attributes
  // specified in the request. If no device attributes were specified, this
  // field is not populated.
  Compatibility compatibility = 7;

  // The download size for this app. If no device attributes were specified or
  // the app is not compatible, this field is not populated.
  DownloadSize download_size = 8;

  option (buf.validate.message).cel = {
    id: "download_size.is_present_if_and_only_if_app_is_compatible"
    message: "download size must be present if and only if the app is compatible"
    expression:
      "!has(this.download_size) || this.compatibility.level =="
      "accrescent.directory.v1beta1.CompatibilityLevel.COMPATIBILITY_LEVEL_COMPATIBLE"
  };
}
